<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>sedVPN</title>

  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --bg: var(--tg-theme-bg-color);
      --text: var(--tg-theme-text-color);
      --hint: var(--tg-theme-hint-color);
      --button: var(--tg-theme-button-color);
      --button-text: var(--tg-theme-button-text-color);
      --secondary-bg: var(--tg-theme-secondary-bg-color);
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      padding: 16px;
    }

    .card {
      background: var(--secondary-bg);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--hint);
      font-size: 14px;
    }

    .button {
      width: 100%;
      background: var(--button);
      color: var(--button-text);
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .button.secondary {
      background: transparent;
      color: var(--button);
      border: 1px solid var(--button);
    }

    .row {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="card">
      <div class="title">👤 Профиль</div>
      <div class="subtitle" id="user"></div>
    </div>

    <div class="card">
      <div class="title">🔑 Подписка</div>
      <div class="row">
        <span>Статус</span>
        <span id="status">—</span>
      </div>
      <div class="row">
        <span>Действует до</span>
        <span id="expires">—</span>
      </div>
    </div>

    <button class="button" id="buy">Купить подписку</button>

  </div>

  <script src="app.js"></script>
</body>
</html>
